name: CI
on:
  pull_request:
    branches:
      - main
  push:
    # Release branches are handled by release.yml, not this workflow
    branches-ignore:
      - 'release-*'
  # Allow manual trigger
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - name: Install dependencies
        run: uv sync --locked --dev
      - name: Get version from pyproject.toml
        run: echo "version=$(uv version --short)" >> "$GITHUB_ENV"
      - name: Build Linux with pyinstaller
        run: uv run ./build-linux.sh
      - name: Package as AppImage
        run: ./package-linux.sh
      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: er-save-manager-linux
          path: dist/linux-${{ env.version }}/er-save-manager.AppImage

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: checks
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - name: Install dependencies
        run: uv sync --locked --dev
      - name: Get version
        run: echo "version=$(uv version --short)" >> $env:GITHUB_ENV
      - name: Build Windows with cx_Freeze
        run: uv run ./build-windows.py build
      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: er-save-manager-windows
          path: dist/windows-${{ env.version }}
